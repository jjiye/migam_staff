<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>기억미감 근무 일정 관리</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="기억미감">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0F7711">
<link rel="manifest" href='data:application/manifest+json,{"name":"%EA%B8%B0%EC%96%B5%EB%AF%B8%EA%B0%90+%EA%B7%BC%EB%AC%B4+%EC%9D%BC%EC%A0%95+%EA%B4%80%EB%A6%AC","short_name":"%EA%B8%B0%EC%96%B5%EB%AF%B8%EA%B0%90","start_url":"./","display":"standalone","background_color":"%23f4f5f9","theme_color":"%230F7711"}'>
<style>
:root{
  color-scheme:light;
  --theme:#0F7711;--theme-light:#2a9e2e;--theme-bg:rgba(15,119,17,.08);
  --bg:#f4f5f9;--bg2:#ffffff;--bg3:#f8f9fc;
  --text:#1a1c2e;--text2:#5a5c78;--text3:#9a9cb8;
  --border:#e2e4ef;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;height:100vh;height:100dvh;overflow:hidden;position:fixed;inset:0;width:100%;overscroll-behavior:none;}

/* ── PWA 인트로 ── */
#pwa-intro{position:fixed;inset:0;z-index:1000;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(150deg,#0a5c0c 0%,#0F7711 50%,#1a9e1e 100%);padding:40px 32px;padding-bottom:max(40px,env(safe-area-inset-bottom));}
.pwa-logo-wrap{width:88px;height:88px;background:#fff;border-radius:24px;display:flex;align-items:center;justify-content:center;margin-bottom:22px;box-shadow:0 6px 28px rgba(0,0,0,.22);}
.pwa-logo-text{font-size:30px;font-weight:900;color:#0F7711;letter-spacing:-1px;}
.pwa-title{font-size:22px;font-weight:900;color:#fff;margin-bottom:6px;letter-spacing:-.5px;}
.pwa-sub{font-size:13px;color:rgba(255,255,255,.7);margin-bottom:52px;}
.pwa-install-btn{width:100%;max-width:300px;padding:17px 20px;border-radius:16px;border:none;background:#fff;color:#0F7711;font-size:16px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 4px 24px rgba(0,0,0,.18);font-family:inherit;margin-bottom:14px;transition:transform .1s,box-shadow .1s;}
.pwa-install-btn:active{transform:scale(.97);box-shadow:0 2px 12px rgba(0,0,0,.14);}
.pwa-install-hint{font-size:11px;color:rgba(255,255,255,.55);margin-bottom:28px;text-align:center;line-height:1.6;}
.pwa-skip{background:none;border:none;color:rgba(255,255,255,.5);font-size:12px;cursor:pointer;padding:10px;font-family:inherit;text-decoration:underline;text-underline-offset:3px;}

/* ── 로딩 ── */
#loading-overlay{position:fixed;inset:0;background:rgba(240,241,249,.88);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:998;flex-direction:column;gap:14px;}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--theme);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-txt{font-size:13px;color:var(--text3);}

/* ── 로그인 ── */
#login-overlay{position:fixed;inset:0;background:rgba(220,222,235,.92);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;z-index:999;}
.login-box{background:#fff;border:1px solid var(--border);border-radius:20px;padding:36px 40px;width:380px;box-shadow:0 8px 40px rgba(0,0,0,.12);display:flex;flex-direction:column;gap:16px;}
.login-logo{font-size:20px;font-weight:900;color:var(--text);text-align:center;}
.login-logo span{color:var(--theme);}
.login-step{display:none;flex-direction:column;gap:14px;}
.login-step.active{display:flex;}
.back-btn{background:none;border:none;color:var(--text3);font-size:12px;cursor:pointer;text-align:left;padding:0;font-family:inherit;}
.back-btn:hover{color:var(--text2);}

/* 역할 선택 */
.role-select{display:flex;gap:10px;}
.role-btn{flex:1;padding:18px 10px;border-radius:12px;border:2px solid var(--border);background:#f8f9fc;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px;transition:all .15s;font-family:inherit;}
.role-btn:hover{border-color:var(--theme);background:var(--theme-bg);}
.role-btn .ri{font-size:28px;}
.role-btn .rn{font-size:13px;font-weight:800;color:var(--text);}
.role-btn .rd{font-size:10px;color:var(--text3);}

/* 관리자 이름 선택 */
.admin-name-list{display:flex;flex-direction:column;gap:8px;}
.admin-name-btn{padding:13px 16px;border-radius:10px;border:1.5px solid var(--border);background:#f8f9fc;cursor:pointer;font-size:14px;font-weight:700;color:var(--text);font-family:inherit;display:flex;align-items:center;gap:10px;transition:all .15s;}
.admin-name-btn:hover{border-color:var(--theme);background:var(--theme-bg);}
.admin-name-btn .perm{font-size:10px;color:var(--text3);margin-left:auto;text-align:right;line-height:1.4;}

/* 비밀번호 */
.selected-label{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--theme-bg);border-radius:8px;font-size:13px;font-weight:700;color:var(--theme);}
.login-label{font-size:12px;color:var(--text2);font-weight:600;margin-bottom:6px;}
.login-inp{width:100%;background:#f8f9fc;border:1.5px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-size:15px;outline:none;transition:border-color .2s;font-family:inherit;}
.login-inp:focus{border-color:var(--theme);}
.login-btn-main{width:100%;padding:12px;border-radius:10px;border:none;background:var(--theme);color:#fff;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;}
.login-btn-main:hover{filter:brightness(1.1);}
.login-err{font-size:12px;color:#e03030;text-align:center;min-height:16px;}

/* ── 기본 근무시간 모달 ── */
#dh-modal{position:fixed;inset:0;background:rgba(0,0,0,.38);display:none;align-items:center;justify-content:center;z-index:900;}
#dh-modal.open{display:flex;}
.dh-box{background:#fff;border-radius:16px;padding:28px;width:400px;max-height:80vh;overflow-y:auto;box-shadow:0 12px 48px rgba(0,0,0,.2);display:flex;flex-direction:column;gap:14px;}
.dh-title{font-size:15px;font-weight:900;color:var(--text);}
.dh-subtitle{font-size:11px;color:var(--text3);line-height:1.5;margin-top:-6px;}
.dh-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);}
.dh-row:last-of-type{border-bottom:none;}
.dh-name{font-size:13px;font-weight:700;color:var(--text);min-width:80px;}
.dh-time-wrap{display:flex;align-items:center;gap:6px;flex:1;}
.dh-time-inp{background:#f8f9fc;border:1.5px solid var(--border);border-radius:7px;color:var(--text);font-size:13px;font-weight:600;padding:5px 8px;outline:none;width:72px;text-align:center;font-family:monospace;transition:border-color .2s;}
.dh-time-inp:focus{border-color:var(--theme);}
.dh-sep{color:var(--text3);font-size:13px;font-weight:700;}
.dh-clear{padding:3px 8px;border-radius:5px;border:1.5px solid var(--border);background:#fff;color:var(--text3);font-size:10px;cursor:pointer;font-family:inherit;}
.dh-clear:hover{border-color:#e03030;color:#e03030;}
.dh-actions{display:flex;gap:8px;justify-content:flex-end;padding-top:8px;border-top:1px solid var(--border);}
.dh-cancel{padding:8px 18px;border-radius:8px;border:1.5px solid var(--border);background:#fff;color:var(--text2);font-size:13px;cursor:pointer;font-family:inherit;}
.dh-save{padding:8px 20px;border-radius:8px;border:none;background:var(--theme);color:#fff;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit;}

/* ── 헤더 ── */
.hdr{background:var(--bg2);border-bottom:1px solid #fff;padding:10px 20px;display:flex;align-items:center;gap:10px;flex-shrink:0;flex-wrap:wrap;}
.hdr-title{font-size:16px;font-weight:800;color:var(--text);white-space:nowrap;}
.month-nav-bar{display:flex;justify-content:center;align-items:center;padding:12px 0;flex-shrink:0;}
.month-nav{display:flex;align-items:center;gap:16px;}
.month-nav button{background:none;border:none;color:var(--text3);font-size:22px;cursor:pointer;padding:0 4px;line-height:1;font-family:inherit;}
.month-nav button:hover{color:var(--theme);}
.month-label{font-size:15px;font-weight:800;min-width:80px;text-align:center;color:var(--text);cursor:pointer;border-radius:6px;padding:2px 6px;transition:background .15s;}
.month-label:hover{background:rgba(0,0,0,.06);}
/* ── 월 피커 ── */
.mpicker-overlay{position:fixed;inset:0;z-index:600;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.35);}
.mpicker-box{background:#fff;border-radius:18px;padding:20px;width:260px;box-shadow:0 12px 40px rgba(0,0,0,.22);}
.mpicker-year-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.mpicker-year{font-size:16px;font-weight:800;color:var(--text);}
.mpicker-yr-btn{background:none;border:none;font-size:22px;cursor:pointer;color:var(--text3);padding:0 4px;line-height:1;font-family:inherit;}
.mpicker-yr-btn:hover{color:var(--theme);}
.mpicker-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
.mpicker-m{padding:9px 0;border-radius:9px;border:1px solid var(--border);background:#fff;font-size:13px;font-weight:600;cursor:pointer;color:var(--text2);font-family:inherit;transition:all .15s;}
.mpicker-m:hover{border-color:var(--theme);color:var(--theme);}
.mpicker-m.mpick-cur{background:var(--theme);color:#fff;border-color:var(--theme);}
/* ── 시간 편집 모달 ── */
.time-edit-overlay{position:fixed;inset:0;z-index:700;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.4);}
.time-edit-box{background:#fff;border-radius:16px;padding:22px 20px;width:min(300px,90vw);box-shadow:0 12px 40px rgba(0,0,0,.22);}
.time-edit-title{font-size:14px;font-weight:800;color:var(--text);margin-bottom:3px;}
.time-edit-hint{font-size:11px;color:var(--text3);margin-bottom:14px;}
.time-edit-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.time-edit-row label{font-size:12px;font-weight:700;color:var(--text2);width:28px;flex-shrink:0;}
.time-edit-inp{flex:1;padding:7px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:15px;font-family:inherit;color:var(--text);}
.time-edit-inp:focus{outline:none;border-color:var(--theme);}
.time-edit-actions{display:flex;align-items:center;justify-content:space-between;margin-top:14px;}
.time-edit-reset{background:none;border:1.5px solid var(--border);border-radius:8px;padding:6px 10px;font-size:11px;color:var(--text3);cursor:pointer;font-family:inherit;}
.time-edit-reset:hover{border-color:#e03030;color:#e03030;}
.time-edit-btns{display:flex;gap:6px;}
.time-edit-cancel{background:none;border:1.5px solid var(--border);border-radius:8px;padding:6px 14px;font-size:12px;color:var(--text2);cursor:pointer;font-family:inherit;}
.time-edit-save{background:var(--theme);border:none;border-radius:8px;padding:6px 14px;font-size:12px;font-weight:800;color:#fff;cursor:pointer;font-family:inherit;}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.badge-admin{padding:4px 10px;border-radius:6px;background:#ffd600;color:#1a237e;font-size:11px;font-weight:800;}
.badge-view{padding:4px 10px;border-radius:6px;background:#e8e8f4;color:var(--text2);font-size:11px;font-weight:700;}
.logout-btn{padding:4px 10px;border-radius:6px;border:1.5px solid var(--border);background:transparent;color:var(--text3);font-size:11px;font-weight:700;cursor:pointer;}
.logout-btn:hover{border-color:#e03030;color:#e03030;}

/* ── 매장 탭 ── */
.store-tabbar{display:flex;flex-shrink:0;background:var(--bg);}
.stab{flex:1;padding:10px 0;text-align:center;cursor:pointer;font-size:16px;font-weight:700;color:var(--text3);border-bottom:3px solid var(--border);transition:color .15s,border-color .15s;white-space:nowrap;user-select:none;}
.stab:hover{color:var(--text2);}
.stab.active{color:var(--text);border-bottom-color:var(--theme);}
.stab .view-tag{font-size:9px;font-weight:600;color:var(--text3);background:#eee;border-radius:3px;padding:1px 4px;margin-left:4px;vertical-align:middle;}

/* ── 캘린더 영역 ── */
.cal-wrap{flex:1;min-height:0;overflow-x:auto;overflow-y:auto;padding:0 16px 58px 20px;overscroll-behavior:contain;-webkit-overflow-scrolling:touch;}
table{border-collapse:collapse;min-width:100%;background:var(--bg2);border-radius:10px;overflow:hidden;box-shadow:0 1px 6px rgba(0,0,0,.06);}
th,td{border:1px solid var(--border);text-align:center;vertical-align:middle;white-space:nowrap;}
th.col-day.week-b{background:#fff;}
td.day-cell.off.week-b{background:#fff;}
td.day-cell.off.sun-col.week-b{background:#fff5f5;}
td.day-cell.off.sat-col.week-b{background:#f5f5ff;}

th.col-name{width:110px;min-width:110px;background:var(--bg3);font-size:13px;font-weight:700;padding:6px 8px;position:sticky;left:0;z-index:2;color:var(--text);}
th.col-cnt{width:76px;min-width:76px;background:var(--bg3);font-size:11px;padding:4px 6px;position:sticky;right:110px;z-index:2;color:var(--text2);}
th.col-hrs{width:110px;min-width:110px;background:var(--bg3);font-size:11px;padding:6px;position:sticky;right:0;z-index:2;color:var(--text2);line-height:1.5;}
.set-dh-btn{display:inline-block;margin-top:4px;padding:2px 8px;border-radius:5px;border:1.5px solid var(--border);background:#fff;color:var(--theme);font-size:10px;font-weight:800;cursor:pointer;font-family:inherit;}
.set-dh-btn:hover{background:var(--theme-bg);}
th.col-day{min-width:30px;width:30px;font-size:12px;padding:4px 2px;background:var(--bg3);color:var(--text2);}
th.col-day.sun{color:#cc2222;background:#fff8f8;}
th.col-day.sat{color:#2244bb;background:#f8f8ff;}
th.dow{font-size:12px;}th.date-num{font-size:13px;font-weight:700;}

td.name-cell{font-size:13px;font-weight:700;padding:0 4px 0 0;background:var(--bg3);position:sticky;left:0;z-index:1;min-width:110px;text-align:left;}
.name-inner{display:flex;align-items:center;width:100%;}
.name-bar{width:3px;flex-shrink:0;align-self:stretch;border-radius:1px;}
.name-text{flex:1;padding:7px 8px;font-size:14px;font-weight:700;cursor:pointer;text-align:left;color:var(--text);}
.name-text:hover{color:var(--theme);}
.name-text.readonly{cursor:default;}
.name-text.readonly:hover{color:var(--text);}
.name-edit-inp{flex:1;background:#fff;border:1.5px solid var(--theme);border-radius:4px;color:var(--text);font-size:13px;font-weight:700;padding:4px 8px;outline:none;min-width:0;font-family:inherit;}
.del-btn{flex-shrink:0;width:18px;height:18px;border-radius:4px;border:none;background:#ffe8e8;color:#d05050;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s;margin-left:3px;}
td.name-cell:hover .del-btn{opacity:1;}

td.cnt-cell{font-size:10px;padding:4px 6px;background:var(--bg3);position:sticky;right:110px;z-index:1;line-height:1.6;color:var(--text3);}
td.cnt-cell .w{color:#2a8a30;font-weight:700;}
td.cnt-cell .o{color:#bb3355;font-weight:700;}
td.hrs-cell{font-size:10px;padding:5px 8px;background:var(--bg3);position:sticky;right:0;z-index:1;color:var(--text3);min-width:110px;line-height:1.8;text-align:center;}
td.hrs-cell .hv{display:block;color:#b07000;font-weight:800;font-size:13px;}
td.hrs-cell .hdef{display:block;font-size:9px;color:var(--text3);}
td.hrs-cell .hno{display:block;font-size:9px;color:#e08030;}

td.day-cell{width:30px;min-width:30px;height:38px;cursor:pointer;transition:filter .1s;position:relative;}
td.day-cell.readonly-cell{cursor:default;}
td.day-cell:not(.readonly-cell):hover{filter:brightness(.92);}
td.day-cell.off{background:#f5f5fa;}
td.day-cell.off.sun-col{background:#fff5f5;}
td.day-cell.off.sat-col{background:#f5f5ff;}
.cell-badge{position:absolute;bottom:2px;left:50%;transform:translateX(-50%);font-size:7px;color:rgba(255,255,255,.95);font-weight:700;pointer-events:none;line-height:1;white-space:nowrap;letter-spacing:-.3px;}
.week-sep{border-right:1px solid var(--border) !important;}
th.date-num,th.dow{cursor:pointer;}
th.date-num:hover,th.dow:hover{background:rgba(0,0,0,.06) !important;}
.col-highlight{filter:brightness(.80);}

tr.add-row td{background:var(--bg);padding:6px 10px;}
.add-row-inner{display:flex;align-items:center;gap:8px;}
.add-name-inp{background:#fff;border:1.5px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;padding:4px 10px;outline:none;width:130px;font-family:inherit;}
.add-name-inp:focus{border-color:var(--theme);}
.add-name-btn{padding:4px 12px;border-radius:6px;border:none;background:var(--theme);color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;}
.add-name-btn:hover{opacity:.88;}
.add-hint{font-size:10px;color:var(--text3);}

/* ── 메시지 바텀시트 ── */
.msg-sheet{position:fixed;bottom:0;left:0;right:0;background:#fff;border-radius:14px 14px 0 0;border-top:1.5px solid var(--border);box-shadow:0 -4px 20px rgba(0,0,0,.08);transform:translateY(calc(100% - 48px));transition:transform .32s cubic-bezier(.4,0,.2,1);z-index:400;display:none;}
.msg-sheet.sheet-visible{display:block;}
.msg-sheet.sheet-open{transform:translateY(0);}
.msg-sheet-handle{display:flex;align-items:center;justify-content:center;height:48px;padding:0 20px;cursor:pointer;user-select:none;gap:8px;}
.msg-sheet-handle:hover{background:rgba(0,0,0,.02);}
.msg-sheet-label{font-size:14px;font-weight:700;color:var(--text);}
.msg-sheet-badge{background:#e03030;color:#fff;font-size:10px;font-weight:400;border-radius:10px;padding:1px 7px;min-width:20px;text-align:center;}
.msg-sheet-chevron{display:inline-flex;align-items:center;justify-content:center;color:var(--text3);transition:transform .3s;}
.msg-sheet.sheet-open .msg-sheet-chevron{transform:rotate(180deg);}
.msg-sheet-sep{height:1px;background:#f0f0f0;display:none;}
.msg-sheet.sheet-open .msg-sheet-sep{display:block;}
.msg-sheet-body{padding:12px 20px 16px;max-height:240px;overflow-y:auto;}

/* 일반 사용자: 발송 폼 */
.msg-send-form{display:flex;align-items:center;gap:8px;}
.msg-send-label{font-size:12px;font-weight:800;color:var(--text2);white-space:nowrap;}
.msg-name-inp{background:var(--bg3);border:1.5px solid var(--border);border-radius:7px;color:var(--text);font-size:13px;padding:7px 10px;outline:none;width:120px;font-family:inherit;transition:border-color .2s;}
.msg-name-inp:focus{border-color:var(--theme);}
.msg-content-inp{flex:1;background:var(--bg3);border:1.5px solid var(--border);border-radius:7px;color:var(--text);font-size:13px;padding:7px 12px;outline:none;font-family:inherit;transition:border-color .2s;}
.msg-content-inp:focus{border-color:var(--theme);}
.msg-send-btn{padding:7px 18px;border-radius:7px;border:none;background:var(--theme);color:#fff;font-size:13px;font-weight:800;cursor:pointer;white-space:nowrap;font-family:inherit;transition:filter .15s;}
.msg-send-btn:hover{filter:brightness(1.1);}
.msg-send-btn:disabled{background:#ccc;cursor:default;}

/* 관리자: 받은 메시지 */
.msg-inbox-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.msg-inbox-title{font-size:12px;font-weight:800;color:var(--text2);flex:1;}
.msg-allview-btn{padding:2px 9px;border-radius:5px;border:1.5px solid var(--theme);background:#fff;color:var(--theme);font-size:10px;font-weight:700;cursor:pointer;font-family:inherit;}
.msg-allview-btn:hover{background:var(--theme);color:#fff;}
.msg-clear-btn{padding:2px 8px;border-radius:5px;border:1.5px solid var(--border);background:#fff;color:var(--text3);font-size:10px;cursor:pointer;font-family:inherit;}
.msg-clear-btn:hover{border-color:#e03030;color:#e03030;}
.msg-list{max-height:120px;overflow-y:auto;display:flex;flex-direction:column;gap:4px;}

<script>
// ── 상수 ──────────────────────────────────────────────────────────
const VIEW_PW = '0000';
const ADMINS = [
  { name:'김근호', pw:'rldjralrka1!', editStores:[0,1], permLabel:'심야식당기억·남산기억 수정' },
  { name:'박경규', pw:'pkg1!',         editStores:[0],   permLabel:'심야식당기억 수정 / 남산기억 보기' },
  { name:'안봉호', pw:'abh1!',         editStores:[1],   permLabel:'남산기억 수정 / 심야식당기억 보기' },
];
const COLORS = ['#43a047','#1e88e5','#fb8c00','#8e24aa','#c0ca33','#ff8a65','#00897b','#e91e63','#6d4c41','#0288d1'];
const DOW = ['일','월','화','수','목','금','토'];
const STORE_THEMES = [
  { base:'#0F7711', light:'#2a9e2e', bg:'rgba(15,119,17,.08)' },
  { base:'#0F2477', light:'#1a3aaa', bg:'rgba(15,36,119,.08)' },
];
const DEFAULT_STORES = [
  { name:'심야식당기억', staff:['박경규','안준식','양서준','최예찬','장소영PT','하우승PT','이시헌PT'] },
  { name:'남산기억',     staff:['김근호','안봉호','송정수','주창은','윤건PT','김하늘PT','박주현PT','장성익PT'] },
];

// ── 전역 상태 ──────────────────────────────────────────────────────
let IS_ADMIN = false;
let CURRENT_ADMIN = null; // ADMINS[] 중 하나, 또는 null (일반 사용자)
let ROLE_SEL = null;      // 'admin' | 'view'
let ADMIN_IDX_SEL = null; // ADMINS 인덱스
let STORES = JSON.parse(JSON.stringify(DEFAULT_STORES));
let S = { year:2026, month:7, store:0, schedule:{}, hours:{} };
let MESSAGES = [];
let SELECTED_DAY = null;

// ── 권한 ──────────────────────────────────────────────────────────
function canEditStore(si){ return IS_ADMIN && CURRENT_ADMIN && CURRENT_ADMIN.editStores.includes(si); }
function canEdit(){ return canEditStore(S.store); }

// ── Supabase ───────────────────────────────────────────────────────
const SUPA_URL = 'https://ybmcynfrzlxnarorfkqi.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlibWN5bmZyemx4bmFyb3Jma3FpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1NzI0MTYsImV4cCI6MjA5NzE0ODQxNn0.HVE2EI72S2EJ2Nr7U5X6nQGyoz2mgdQZhYMfxZW4Ugo';
const SUPA_HDR = { 'apikey':SUPA_KEY, 'Authorization':`Bearer ${SUPA_KEY}`, 'Content-Type':'application/json' };
const MSG_ROW_ID = 'msgs'; // 메시지 전용 cal_data 행

function showLoading(msg='데이터 불러오는 중...'){ document.getElementById('loading-txt').textContent=msg; document.getElementById('loading-overlay').style.display='flex'; }
function hideLoading(){ document.getElementById('loading-overlay').style.display='none'; }

// ── 저장 ──────────────────────────────────────────────────────────
async function save(){
  localStorage.setItem('cal5_stores', JSON.stringify(STORES));
  localStorage.setItem('cal5_state',  JSON.stringify(S));
  fetch(`${SUPA_URL}/rest/v1/cal_data?id=eq.main`,{
    method:'PATCH', headers:SUPA_HDR,
    body:JSON.stringify({stores:STORES, schedule:S.schedule, hours:S.hours, updated_at:new Date().toISOString()}),
  }).catch(e=>console.warn('Cloud save failed:',e));
}

// ── 로드 ──────────────────────────────────────────────────────────
async function load(){
  try{
    const rv=localStorage.getItem('cal5_state');
    if(rv){const sv=JSON.parse(rv);if(sv.year)S.year=sv.year;if(sv.month)S.month=sv.month;if(sv.store!==undefined)S.store=sv.store;}
  }catch(e){}
  try{
    const res=await fetch(`${SUPA_URL}/rest/v1/cal_data?id=eq.main&select=stores,schedule,hours`,{headers:SUPA_HDR});
    if(!res.ok)throw new Error(`HTTP ${res.status}`);
    const data=await res.json();
    if(data[0]){
      if(data[0].stores){STORES.length=0;data[0].stores.forEach(s=>STORES.push(s));}
      S.schedule=data[0].schedule||{};
      S.hours   =data[0].hours   ||{};
    }else{
      await fetch(`${SUPA_URL}/rest/v1/cal_data`,{method:'POST',headers:{...SUPA_HDR,'Prefer':'return=minimal'},
        body:JSON.stringify({id:'main',stores:STORES,schedule:{},hours:{},updated_at:new Date().toISOString()})});
    }
  }catch(e){
    console.warn('Cloud load failed, fallback:',e);
    try{
      const rs=localStorage.getItem('cal5_stores');if(rs){const p=JSON.parse(rs);STORES.length=0;p.forEach(s=>STORES.push(s));}
      const rv=localStorage.getItem('cal5_state');if(rv){const sv=JSON.parse(rv);S.schedule=sv.schedule||{};S.hours=sv.hours||{};}
    }catch(e2){}
  }
  DEFAULT_STORES.forEach((ds,i)=>{
    if(!STORES[i])STORES.push({name:ds.name,staff:[...ds.staff],monthlyStaff:{},staffDefaultHours:{}});
    else{STORES[i].staff=[...ds.staff];if(!STORES[i].monthlyStaff)STORES[i].monthlyStaff={};if(!STORES[i].staffDefaultHours)STORES[i].staffDefaultHours={};}
  });
}

// ── 메시지 로드 ───────────────────────────────────────────────────
async function loadMessages(){
  try{
    const res=await fetch(`${SUPA_URL}/rest/v1/cal_data?id=eq.${MSG_ROW_ID}&select=schedule`,{headers:SUPA_HDR});
    const data=await res.json();
    if(data[0]){ MESSAGES=data[0].schedule||[]; }
    else{
      MESSAGES=[];
      await fetch(`${SUPA_URL}/rest/v1/cal_data`,{method:'POST',headers:{...SUPA_HDR,'Prefer':'return=minimal'},
        body:JSON.stringify({id:MSG_ROW_ID,schedule:[],updated_at:new Date().toISOString()})});
    }
  }catch(e){
    MESSAGES=JSON.parse(localStorage.getItem('cal5_messages')||'[]');
  }
}

// ── 메시지 발송 ───────────────────────────────────────────────────
async function sendMessage(){
  const nameEl=document.getElementById('msg-name-inp');
  const contentEl=document.getElementById('msg-content-inp');
  const sendBtn=document.getElementById('msg-send-btn');
  if(!nameEl||!contentEl)return;
  const name=nameEl.value.trim();
  const content=contentEl.value.trim();
  if(!name||!content)return;
  const msg={name,content,at:new Date().toISOString()};
  MESSAGES.push(msg);
  localStorage.setItem('cal5_messages',JSON.stringify(MESSAGES));
  fetch(`${SUPA_URL}/rest/v1/cal_data?id=eq.${MSG_ROW_ID}`,{
    method:'PATCH',headers:SUPA_HDR,
    body:JSON.stringify({schedule:MESSAGES,updated_at:new Date().toISOString()}),
  }).catch(e=>console.warn('Message send failed:',e));
  nameEl.value='';contentEl.value='';
  sendBtn.textContent='✓ 전송됨';sendBtn.disabled=true;
  setTimeout(()=>{sendBtn.textContent='발송';sendBtn.disabled=false;},2000);
}

// 메시지 전체 삭제 (관리자)
async function clearMessages(){
  if(!IS_ADMIN)return;
  if(!confirm('모든 메시지를 삭제할까요?'))return;
  MESSAGES=[];
  localStorage.setItem('cal5_messages','[]');
  fetch(`${SUPA_URL}/rest/v1/cal_data?id=eq.${MSG_ROW_ID}`,{
    method:'PATCH',headers:SUPA_HDR,
    body:JSON.stringify({schedule:[],updated_at:new Date().toISOString()}),
  }).catch(e=>console.warn('Clear messages failed:',e));
  renderMsgSection();
}

// 메시지 상태 토글 (done / review / null)
async function setMsgStatus(realIdx, newStatus){
  if(!IS_ADMIN)return;
  const m=MESSAGES[realIdx];if(!m)return;
  if(m.status===newStatus){m.status=null;m.checkedAt=null;}
  else{m.status=newStatus;m.checkedAt=newStatus==='done'?new Date().toISOString():m.checkedAt||null;}
  localStorage.setItem('cal5_messages',JSON.stringify(MESSAGES));
  fetch(`${SUPA_URL}/rest/v1/cal_data?id=eq.${MSG_ROW_ID}`,{
    method:'PATCH',headers:SUPA_HDR,

// ── 유틸 ──────────────────────────────────────────────────────────
function daysInMonth(y,m){return new Date(y,m,0).getDate();}
function dowOf(y,m,d){return new Date(y,m-1,d).getDay();}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function nthWeekday(y,m,d){const w=dowOf(y,m,d);let n=0;for(let dd=1;dd<=d;dd++)if(dowOf(y,m,dd)===w)n++;return n;}
function isPT(name){return name.includes('PT');}

function parseTime(t){if(!t)return null;const m=t.match(/^(\d{1,2}):(\d{2})$/);if(!m)return null;const h=parseInt(m[1]),mi=parseInt(m[2]);if(h>23||mi>59)return null;return h*60+mi;}
function rangeDuration(s,e){const sm=parseTime(s),em=parseTime(e);if(sm===null||em===null)return 0;return(em>=sm?em-sm:em+1440-sm)/60;}
function fmtBadge(s,e){if(!s||!e)return'';return s.replace(':00','')+'~'+e.replace(':00','');}
function fmtFull(s,e){return`${s||'00:00'}~${e||'00:00'}`;}
function padTime(t){if(!t||!t.includes(':'))return t||'';const[h,mi]=t.split(':');return`${String(parseInt(h)||0).padStart(2,'0')}:${String(parseInt(mi)||0).padStart(2,'0')}`;}

function defaultStatus(st,y,m,d){
  const w=dowOf(y,m,d);
  if(st===0)return w===2?'off':'work';
  if(st===1){if(w===1)return'off';if(w===2){const n=nthWeekday(y,m,d);return(n===2||n===4)?'off':'work';}return'work';}
  return'work';
}
function getMonthStaff(st,y,m){const key=`${y}-${m}`;const ms=STORES[st].monthlyStaff;if(ms&&ms[key])return ms[key];return[...STORES[st].staff];}
function ensureMonthStaff(st,y,m){if(!STORES[st].monthlyStaff)STORES[st].monthlyStaff={};const key=`${y}-${m}`;if(!STORES[st].monthlyStaff[key])STORES[st].monthlyStaff[key]=[...getMonthStaff(st,y,m)];return STORES[st].monthlyStaff[key];}
function getCell(st,y,m,name,d){const v=S.schedule?.[st]?.[y]?.[m]?.[name]?.[d];return v!==undefined?v:defaultStatus(st,y,m,d);}
function setCell(st,y,m,name,d,val){if(!S.schedule[st])S.schedule[st]={};if(!S.schedule[st][y])S.schedule[st][y]={};if(!S.schedule[st][y][m])S.schedule[st][y][m]={};if(!S.schedule[st][y][m][name])S.schedule[st][y][m][name]={};S.schedule[st][y][m][name][d]=val;}
function getDefaultHours(st,name){return(STORES[st]?.staffDefaultHours||{})[name]||null;}
function getHoursOverride(st,y,m,name,d){return S.hours?.[st]?.[y]?.[m]?.[name]?.[d]||null;}
function getEffectiveHours(st,y,m,name,d){const ov=getHoursOverride(st,y,m,name,d);if(ov)return{...ov,isOverride:true};const def=getDefaultHours(st,name);if(def)return{...def,isOverride:false};return null;}
function setHoursOverride(st,y,m,name,d,val){if(!S.hours[st])S.hours[st]={};if(!S.hours[st][y])S.hours[st][y]={};if(!S.hours[st][y][m])S.hours[st][y][m]={};if(!S.hours[st][y][m][name])S.hours[st][y][m][name]={};S.hours[st][y][m][name][d]=val;}
function deleteHoursOverride(st,y,m,name,d){if(S.hours?.[st]?.[y]?.[m]?.[name])delete S.hours[st][y][m][name][d];}
function totalHoursCalc(st,y,m,name){let t=0;for(let d=1;d<=daysInMonth(y,m);d++){if(getCell(st,y,m,name,d)!=='work')continue;const eff=getEffectiveHours(st,y,m,name,d);if(eff)t+=rangeDuration(eff.s,eff.e);}return t;}
function countWork(st,y,m,name){const days=daysInMonth(y,m);let w=0,o=0;for(let d=1;d<=days;d++)getCell(st,y,m,name,d)==='work'?w++:o++;return{w,o};}

function saveDhModal(){
  const{store:st,year:y,month:m}=S;
  const ptStaff=getMonthStaff(st,y,m).filter(isPT);
  if(!STORES[st].staffDefaultHours)STORES[st].staffDefaultHours={};
  let err=false;
  ptStaff.forEach(name=>{
    if(err)return;
    const sEl=document.getElementById('dhs-'+name);const eEl=document.getElementById('dhe-'+name);if(!sEl||!eEl)return;
    const sv=sEl.value.trim(),ev=eEl.value.trim();
    if(!sv&&!ev){delete STORES[st].staffDefaultHours[name];return;}
    const svP=padTime(sv),evP=padTime(ev);
    if(parseTime(svP)===null){alert(`${name}: 시작 시간 형식이 잘못되었습니다.\n예) 18:00`);err=true;return;}
    if(parseTime(evP)===null){alert(`${name}: 종료 시간 형식이 잘못되었습니다.\n예) 23:00`);err=true;return;}
    STORES[st].staffDefaultHours[name]={s:svP,e:evP};
  });
  if(err)return;
  save();closeDhModal();render();
}

function startEditName(si){

  const cell=document.getElementById(`name-cell-${si}`);const inner=cell.querySelector('.name-inner');

  inner.appendChild(bar);inner.appendChild(inp);inp.focus();inp.select();
  function commit(){
    const newName=inp.value.trim();
    if(newName&&newName!==oldName){
      if(staff.includes(newName)){alert('같은 이름의 직원이 이미 있습니다.');inp.focus();return;}
      staff[si]=newName;
      [S.schedule,S.hours].forEach(obj=>{const dd=obj[st];if(dd)Object.values(dd).forEach(yr=>Object.values(yr).forEach(mo=>{if(mo[oldName]){mo[newName]=mo[oldName];delete mo[oldName];}}));});
      if(STORES[st].staffDefaultHours&&STORES[st].staffDefaultHours[oldName]){STORES[st].staffDefaultHours[newName]=STORES[st].staffDefaultHours[oldName];delete STORES[st].staffDefaultHours[oldName];}
      save();
    }
    render();
  }
  inp.addEventListener('blur',commit);
  inp.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();inp.blur();}if(e.key==='Escape'){inp.value=oldName;inp.blur();}});
}

    if(pw===a.pw){IS_ADMIN=true;CURRENT_ADMIN=a;ok=true;}
  }else if(ROLE_SEL==='view'){
    if(pw===VIEW_PW){IS_ADMIN=false;CURRENT_ADMIN=null;ok=true;}
  }
  if(!ok){
    const err=document.getElementById('login-err');err.textContent='비밀번호가 틀렸습니다.';
    document.getElementById('pw-input').value='';setTimeout(()=>{err.textContent='';},2500);return;
  }
  document.getElementById('login-overlay').style.display='none';
  document.getElementById('pw-input').value='';
  await initApp();
}
function doLogout(){
  IS_ADMIN=false;CURRENT_ADMIN=null;ROLE_SEL=null;ADMIN_IDX_SEL=null;
  document.getElementById('pw-input').value='';document.getElementById('login-err').textContent='';
  gotoStep('role');
  document.getElementById('login-overlay').style.display='flex';
  const ms=document.getElementById('msg-section');ms.innerHTML='';
  const sheet=document.getElementById('msg-sheet');sheet.classList.remove('sheet-visible','sheet-open');
}

// ── 매장 탭 ──────────────────────────────────────────────────────
function buildStoreTabs(){
  const el=document.getElementById('store-tabbar');
  el.innerHTML=STORES.map((s,i)=>{
    const t=STORE_THEMES[i];const isActive=S.store===i;
    const style=isActive?`color:${t.base};border-bottom-color:${t.base};background:${t.bg};`:'';
    const viewTag=IS_ADMIN&&!canEditStore(i)?'<span class="view-tag">보기</span>':'';
    return`<div class="stab${isActive?' active':''}" style="${style}" onclick="switchStore(${i})">${esc(s.name)}${viewTag}</div>`;
  }).join('');
  const t=STORE_THEMES[S.store];
  document.documentElement.style.setProperty('--theme',t.base);
  document.documentElement.style.setProperty('--theme-light',t.light);
  document.documentElement.style.setProperty('--theme-bg',t.bg);
}
function switchStore(i){SELECTED_DAY=null;S.store=i;save();render();}

// ── 렌더 ─────────────────────────────────────────────────────────
function render(){
  const{year:y,month:m,store:st}=S;
  document.getElementById('month-label').textContent=`${y}년 ${m}월`;
  const badge=document.getElementById('role-badge');
  if(IS_ADMIN&&CURRENT_ADMIN){badge.className='badge-admin';badge.textContent=`👑 ${CURRENT_ADMIN.name}`;}
  else{badge.className='badge-view';badge.textContent='👁 일반';}
  buildStoreTabs();

  const staff=getMonthStaff(st,y,m);
  const days=daysInMonth(y,m);
  const editable=canEdit();
  const table=document.getElementById('cal');table.innerHTML='';

  const firstDow=dowOf(y,m,1);
  const weekCls=d=>Math.ceil((d+firstDow)/7)%2===0?'week-b':'week-a';

  const trDow=document.createElement('tr');
  let th=document.createElement('th');th.className='col-name';th.rowSpan=2;th.textContent='이름';trDow.appendChild(th);
  for(let d=1;d<=days;d++){
    const w=dowOf(y,m,d);th=document.createElement('th');
    th.className=`col-day dow${w===0?' sun':w===6?' sat':''}`;th.textContent=DOW[w];
    th.dataset.day=d;th.onclick=((_d)=>()=>selectDay(_d))(d);
    th.classList.add(weekCls(d));
    if(w===6)th.classList.add('week-sep');trDow.appendChild(th);
  }
  th=document.createElement('th');th.className='col-cnt';th.rowSpan=2;th.textContent='근무/휴무';trDow.appendChild(th);
  const thHrs=document.createElement('th');thHrs.className='col-hrs';thHrs.rowSpan=2;
  thHrs.innerHTML='근무시간'+(editable?`<br><button class="set-dh-btn" onclick="openDhModal()">⚙ 기본시간 설정</button>`:'');
  trDow.appendChild(thHrs);table.appendChild(trDow);

  const trDate=document.createElement('tr');
  for(let d=1;d<=days;d++){
    const w=dowOf(y,m,d);th=document.createElement('th');
    th.className=`col-day date-num${w===0?' sun':w===6?' sat':''}`;th.textContent=d;
    th.dataset.day=d;
    th.onclick=((_d)=>()=>selectDay(_d))(d);
    th.classList.add(weekCls(d));
    if(w===6)th.classList.add('week-sep');trDate.appendChild(th);
  }
  table.appendChild(trDate);

  staff.forEach((name,si)=>{
    const color=COLORS[si%COLORS.length];const pt=isPT(name);
    const tr=document.createElement('tr');
    const tdName=document.createElement('td');tdName.className='name-cell';tdName.id=`name-cell-${si}`;
    const safeName=esc(name).replace(/'/g,"&#39;");
    if(editable){
      tdName.innerHTML=`<div class="name-inner"><div class="name-bar" style="background:${color}"></div><button class="del-btn" onclick="deleteStaff(${si})">✕</button><span class="name-text" onclick="startEditName(${si})">${esc(name)}</span><span class="name-arrow" onclick="openStaffPopup('${safeName}')">›</span></div>`;
    }else{
      tdName.innerHTML=`<div class="name-inner"><div class="name-bar" style="background:${color}"></div><span class="name-text readonly">${esc(name)}</span><span class="name-arrow" onclick="openStaffPopup('${safeName}')">›</span></div>`;
    }
    tr.appendChild(tdName);

    for(let d=1;d<=days;d++){
      const w=dowOf(y,m,d);
      const status=getCell(st,y,m,name,d);const isWork=status==='work';
      const td=document.createElement('td');
      let cls='day-cell '+status+' '+weekCls(d);
      if(w===0)cls+=' sun-col';if(w===6)cls+=' sat-col';
      if(!editable)cls+=' readonly-cell';
      td.className=cls;
      td.dataset.day=d;
      if(w===6)td.classList.add('week-sep');
      if(isWork){
        if(pt){
          const eff=getEffectiveHours(st,y,m,name,d);
          if(eff){td.style.background=eff.isOverride?color+'99':color;const b=document.createElement('span');b.className='cell-badge';b.textContent=fmtBadge(eff.s,eff.e);td.appendChild(b);}
          else{td.style.background=color;}
        }else{td.style.background=color;}
      }
      const eff2=pt?getEffectiveHours(st,y,m,name,d):null;
      td.title=`${name} ${m}/${d}(${DOW[w]}) · ${isWork?'근무':'휴무'}`+(eff2?` · ${fmtFull(eff2.s,eff2.e)}${eff2.isOverride?' ✏변경됨':' (기본)'}`:'');
      if(editable){if(pt){attachLongPress(td,name,d);}else{td.onclick=((_n,_d)=>()=>handleCellClick(_n,_d))(name,d);}}
      tr.appendChild(td);
    }

    const{w:wc,o:oc}=countWork(st,y,m,name);
    const tdCnt=document.createElement('td');tdCnt.className='cnt-cell';
    tdCnt.innerHTML=`<span class="w">근무 ${wc}</span><br><span class="o">휴무 ${oc}</span>`;tr.appendChild(tdCnt);

    const tdHrs=document.createElement('td');tdHrs.className='hrs-cell';
    if(pt){
      const def=getDefaultHours(st,name);const total=totalHoursCalc(st,y,m,name);
      let html=def?`<span class="hdef">${fmtFull(def.s,def.e)}</span>`:`<span class="hno">기본값 미설정</span>`;
      if(total>0)html+=`<span class="hv">${total%1===0?total:total.toFixed(1)}h</span>`;
      tdHrs.innerHTML=html;
    }else{tdHrs.innerHTML='<span style="color:var(--text3);font-size:10px;">—</span>';}
    tr.appendChild(tdHrs);
    table.appendChild(tr);
  });

  if(editable){
    const trAdd=document.createElement('tr');trAdd.className='add-row';
    const tdAdd=document.createElement('td');tdAdd.colSpan=days+3;
    tdAdd.innerHTML=`<div class="add-row-inner">
      <input class="add-name-inp" id="add-name-inp" placeholder="직원 이름 입력" maxlength="12" onkeydown="if(event.key==='Enter')addStaff()">
      <button class="add-name-btn" onclick="addStaff()">+ 직원 추가</button>
      <span class="add-hint">이번 달만 적용 · PT: 클릭=근무토글, 꾹 누르면=시간변경 · ⚙버튼으로 기본시간 설정</span>
    </div>`;
    trAdd.appendChild(tdAdd);table.appendChild(trAdd);
  }

  applyDayHighlight();
  renderMsgSection();
}

// ── 날짜 컬럼 하이라이트 ──────────────────────────────────────────
function selectDay(d){
  SELECTED_DAY=(SELECTED_DAY===d)?null:d;
  applyDayHighlight();
}
function applyDayHighlight(){
  document.querySelectorAll('.col-highlight').forEach(el=>el.classList.remove('col-highlight'));
  if(SELECTED_DAY!==null){
    document.querySelectorAll(`[data-day="${SELECTED_DAY}"]`).forEach(el=>el.classList.add('col-highlight'));
  }
}

// ── 직원 근무 확인 팝업 (일반 사용자) ────────────────────────────
function openStaffPopup(name){
  const{year:y,month:m,store:st}=S;
  const days=daysInMonth(y,m);
  const pt=isPT(name);
  const si=getMonthStaff(st,y,m).indexOf(name);
  const color=COLORS[si>=0?si%COLORS.length:0];
  const today=new Date();
  const{w:wc,o:oc}=countWork(st,y,m,name);

  // 헤더
  document.getElementById('sp-name').innerHTML=esc(name)+(pt?'<span class="sp-pt-tag">PT</span>':'');
  document.getElementById('sp-sub').textContent=`${y}년 ${m}월`;
  document.getElementById('sp-wc').textContent=wc;
  document.getElementById('sp-wc').style.color=color;
  document.getElementById('sp-oc').textContent=oc;

  // 달력 빌드
  const DOW_LABELS=['일','월','화','수','목','금','토'];
  let html='<div class="sp-dow-row">';
  DOW_LABELS.forEach((d,i)=>{html+=`<div class="sp-dlbl${i===0?' sun':i===6?' sat':''}">${d}</div>`;});
  html+='</div><div class="sp-cal-grid">';

  const firstDow=dowOf(y,m,1);
  for(let i=0;i<firstDow;i++)html+='<div class="sp-d empty"></div>';

  for(let d=1;d<=days;d++){
    const w=dowOf(y,m,d);
    const isWork=getCell(st,y,m,name,d)==='work';
    const eff=pt&&isWork?getEffectiveHours(st,y,m,name,d):null;
    const isToday=today.getFullYear()===y&&today.getMonth()+1===m&&today.getDate()===d;
    let bg='',fg='',cls='sp-d';
    if(isWork){
      if(w===0){bg='#e53935';fg='#fff';}
      else if(w===6){bg='#1e88e5';fg='#fff';}
      else{bg=color;fg='#fff';}
    }else{
      cls+=' off';
      if(w===0)fg='#f9b4b4';
    }
    if(isToday)cls+=' today';
    const style=bg?`background:${bg};color:${fg};`:`${fg?'color:'+fg+';':''}`;
    const inner=eff?`<span style="font-size:7px;line-height:1.3;display:block;">${d}<br>${eff.s.replace(':00','')}~${eff.e.replace(':00','')}${eff.isOverride?'✏':''}</span>`:d;
    html+=`<div class="${cls}" style="${style}">${inner}</div>`;
  }
  html+='</div>';

  // PT 기본시간 / 총시간
  if(pt){
    const def=getDefaultHours(st,name);
    const total=totalHoursCalc(st,y,m,name);
    if(def||total>0){
      html+='<div class="sp-hrs-row">';
      if(def)html+=`<span class="sp-hrs-badge">기본 ${fmtFull(def.s,def.e)}</span>`;
      if(total>0)html+=`<span class="sp-total-badge">이번달 ${total%1===0?total:total.toFixed(1)}h</span>`;
      html+='</div>';
    }
  }

  document.getElementById('sp-body').innerHTML=html;
  document.getElementById('staff-popup-overlay').classList.add('open');
}
function closeStaffPopup(){
  document.getElementById('staff-popup-overlay').classList.remove('open');
}

// ── 초기화 ───────────────────────────────────────────────────────
async function initApp(){
  showLoading('데이터 불러오는 중...');
  await Promise.all([load(), loadMessages()]);
  seedJuly2026();
  hideLoading();
  render();
}

// ── PWA 인트로 ──────────────────────────────────────────────────────
(function(){
  const isStandalone = window.navigator.standalone === true ||
                       window.matchMedia('(display-mode: standalone)').matches;
  const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
  if(isMobile && !isStandalone){
    document.getElementById('pwa-intro').style.display='flex';
    document.getElementById('login-overlay').style.display='none';
  }
})();

// Android Chrome: beforeinstallprompt 저장
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  window._pwaPrompt = e;
});

function pwaInstall(){
  // Android Chrome: 네이티브 설치 프롬프트
  if(window._pwaPrompt){
    window._pwaPrompt.prompt();
    window._pwaPrompt.userChoice.then(()=>{ window._pwaPrompt=null; });
    return;
  }
  // iOS Safari: 공유 시트 열기 → 사용자가 '홈 화면에 추가' 선택
  if(navigator.share){
    navigator.share({
      title: '기억미감 근무 일정 관리',
      url: window.location.href
    }).catch(()=>{});
    return;
  }
  // Fallback (구형 브라우저)
  alert('Safari 하단 공유 버튼(□↑)을 탭한 후\n"홈 화면에 추가"를 선택하세요.');
}

function skipPwaIntro(){
  document.getElementById('pwa-intro').style.display='none';
  document.getElementById('login-overlay').style.display='flex';
}
